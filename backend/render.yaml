services:
  - type: web
    name: blogflow-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blogflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: "https://your-vercel-domain.vercel.app" # You will update this later

databases:
  - name: blogflow-db
    databaseName: blogflow
    user: blogflow_user
